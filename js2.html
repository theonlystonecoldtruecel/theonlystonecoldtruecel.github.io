<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
    <style>
      body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

.image-box {
    width: 600px;
    height: 400px;
    border: 2px solid #333;
    margin-bottom: 20px;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    color: white;
    font-weight: bold;
    padding: 10px;
    text-shadow: 1px 1px 2px black;
}

.gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

figure {
    margin: 0;
}

figure img {
    width: 150px;
    height: 100px;
    object-fit: cover;
    cursor: pointer;
    outline: none;
}

figure img:focus {
    outline: 3px solid #007BFF;
}
    </style>
  <script>
function upDate(previewPic) {
    const imageDiv = document.getElementById('image');
    imageDiv.style.backgroundImage = "url('" + previewPic.src + "')";
    imageDiv.innerHTML = previewPic.alt;
}

function unDo() {
    const imageDiv = document.getElementById('image');
    imageDiv.style.backgroundImage = "url('images/original.jpg')";
    imageDiv.innerHTML = "Hover over or focus on an image below to display here";
}

function addTabFocus() {
    console.log("Tab focus function triggered");

    const images = document.querySelectorAll('.gallery img');
    for (let i = 0; i < images.length; i++) {
        images[i].setAttribute('tabindex', '0');
    }
}
  </script>
</head>
<body onload="addTabFocus()">

    <h1>My Interactive Photo Gallery</h1>

    <div id="image" class="image-box">
        Hover over or focus on an image below to display here
    </div>

    <div class="gallery">
        <figure>
            <img src="mountains.jpg" alt="Mountains" 
                 onmouseover="upDate(this)" onmouseout="unDo()" 
                 onfocus="upDate(this)" onblur="unDo()">
            <figcaption>Sunset over mountains</figcaption>
        </figure>

        <figure>
            <img src="forest.jpg" alt="Forest" 
                 onmouseover="upDate(this)" onmouseout="unDo()" 
                 onfocus="upDate(this)" onblur="unDo()">
            <figcaption>City skyline at night</figcaption>
        </figure>

        <figure>
            <img src="beach.jpg" alt="Beach" 
                 onmouseover="upDate(this)" onmouseout="unDo()" 
                 onfocus="upDate(this)" onblur="unDo()">
            <figcaption>Forest pathway in autumn</figcaption>
        </figure>

        <figure>
            <img src="city.jpg" alt="Beautiful city" 
                 onmouseover="upDate(this)" onmouseout="unDo()" 
                 onfocus="upDate(this)" onblur="unDo()">
            <figcaption>Ocean waves crashing</figcaption>
        </figure>

        <figure>
            <img src="canyon.jpg" alt="Canyon" 
                 onmouseover="upDate(this)" onmouseout="unDo()" 
                 onfocus="upDate(this)" onblur="unDo()">
            <figcaption>Snowy mountain peak</figcaption>
        </figure>

        <figure>
            <img src="steppe.jpg" alt="Steppe" 
                 onmouseover="upDate(this)" onmouseout="unDo()" 
                 onfocus="upDate(this)" onblur="unDo()">
            <figcaption>Calm lake at sunrise</figcaption>
        </figure>
    </div>

</body>
</html>
